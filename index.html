<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moviban</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="hero">
<img src="Moviban_logo.jpg" class="logo">
<h1>Moviban 🚐</h1>
<p>Conectamos tus viajes dentro de Santiago</p>
<a class="btn" href="https://wa.me/56968701629" target="_blank">

Hablar por WhatsApp
</a>
</header>
<section class="container">
<h2>Sugiere una ruta</h2>
<form id="rutaForm">
<select id="salida">
<option>Providencia</option>
<option>Las Condes</option>
<option>Ñuñoa</option>
<option>Maipú</option>
<option>Puente Alto</option>
<option>La Florida</option>
<option>Huechuraba</option>
<option>Santiago Centro</option>
</select>
<select id="destino">
<option>Providencia</option>
<option>Las Condes</option>
<option>Ñuñoa</option>
<option>Maipú</option>
<option>Puente Alto</option>
<option>La Florida</option>
<option>Huechuraba</option>
<option>Santiago Centro</option>
</select>
<button type="button" onclick="enviarRuta()">Enviar</button>
</form>
</section>
<script>

function enviarRuta(){

let salida = document.getElementById("salida").value

let destino = document.getElementById("destino").value

let mensaje = `Hola Moviban! Me gustaría sugerir esta ruta: ${salida} → ${destino}`

window.open(`https://wa.me/56968701629?text=${encodeURIComponent(mensaje)}`)

}
</script>
</body>
</html>
