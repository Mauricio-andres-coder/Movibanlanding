<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moviban</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="hero">
<img src="Moviban_logo.jpg" class="logo">
<h1>Moviban 🚐</h1>
<p>Viajes compartidos dentro de Santiago</p>
<a class="btn" href="https://wa.me/56977654013">
Hablar por WhatsApp
</a>
</header>

<section class="container">
<h2>Rutas disponibles</h2>
<div class="ruta">
<h3>Providencia → Ciudad Empresarial</h3>
<p>Horario: 08:00</p>
<button onclick="inscribirse('Providencia','Ciudad Empresarial','08:00')">
Inscribirme
</button>
</div>

<div class="ruta">
<h3>Maipú → Escuela Militar</h3>
<p>Horario: 07:30</p>
<button onclick="inscribirse('Maipú','Escuela Militar','07:30')">
Inscribirme
</button>
</div>
</section>

<section class="container">
<h2>Sugiere una ruta</h2>
<select id="origen">
<option>Providencia</option>
<option>Maipú</option>
<option>Ñuñoa</option>
</select>

<select id="destino">
<option>Ciudad Empresarial</option>
<option>Escuela Militar</option>
<option>Costanera Center</option>
</select>

<input type="time" id="hora">

<button onclick="sugerirRuta()">
Enviar
</button>
</section>

<script src="script.js"></script>
</body>
</html>
