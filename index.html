<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moviban - Transporte Inteligente</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
}
header{
background:url('https://images.unsplash.com/photo-1544986581-efac024faf62') center/cover no-repeat;
height:70vh;
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}
header h1{
font-size:50px;
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:10px;
}
.container{
padding:40px;
max-width:900px;
margin:auto;
}
button{
background:#ffcc00;
border:none;
padding:15px 25px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}
button:hover{
background:#ffb700;
}
form{
background:white;
padding:25px;
border-radius:10px;
margin-top:30px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}
input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
}
.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>
<body>
<header>
<h1>Moviban 🚐  
<br>Conecta tu viaje dentro de Santiago</h1>
</header>
<div class="container">
<h2>Habla con nosotros</h2>
<p>Si quieres reservar o preguntar por una ruta:</p>
<button onclick="window.open('https://wa.me/56977654013','_blank')">
Hablar por WhatsApp
</button>
<form id="rutaForm">
<h2>Ruta que me gustaría abrir</h2>
<label>Comuna de salida</label>
<select id="salida">
<option>Providencia</option>
<option>Las Condes</option>
<option>Ñuñoa</option>
<option>Maipú</option>
<option>Puente Alto</option>
<option>La Florida</option>
<option>Huechuraba</option>
<option>Santiago Centro</option>
</select>
<label>Comuna de destino</label>
<select id="destino">
<option>Providencia</option>
<option>Las Condes</option>
<option>Ñuñoa</option>
<option>Maipú</option>
<option>Puente Alto</option>
<option>La Florida</option>
<option>Huechuraba</option>
<option>Santiago Centro</option>
</select>
<button type="button" onclick="enviarRuta()">Enviar sugerencia</button>
</form>
<form id="viajeForm">
<h2>Cotiza un viaje especial</h2>
<label>Nombre</label>
<input type="text" id="nombre">
<label>Origen</label>
<input type="text" id="origen">
<label>Destino</label>
<input type="text" id="destinoViaje">
<label>Fecha</label>
<input type="date" id="fecha">
<label>Número de personas</label>
<input type="number" id="personas">
<label>Detalles adicionales</label>
<textarea id="detalle"></textarea>
<button type="button" onclick="enviarViaje()">Cotizar</button>
</form>
</div>
<a class="whatsapp" href="https://wa.me/56977654013" target="_blank">
WhatsApp
</a>
<script>
function enviarRuta(){
let salida = document.getElementById("salida").value
let destino = document.getElementById("destino").value
let mensaje = `Hola Moviban! Me gustaría sugerir una ruta: ${salida} → ${destino}`
window.open(`https://wa.me/56968701629?text=${encodeURIComponent(mensaje)}`)
}
function enviarViaje(){
let nombre = document.getElementById("nombre").value
let origen = document.getElementById("origen").value
let destino = document.getElementById("destinoViaje").value
let fecha = document.getElementById("fecha").value
let personas = document.getElementById("personas").value
let detalle = document.getElementById("detalle").value
let mensaje = `Cotización Moviban 🚐
Nombre: ${nombre}
Origen: ${origen}
Destino: ${destino}
Fecha: ${fecha}
Personas: ${personas}
Detalle: ${detalle}`
window.open(`https://wa.me/56977654013?text=${encodeURIComponent(mensaje)}`)
}
</script>
</body>
</html>
